version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: khalto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-khalto}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-khalto_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-khalto}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - khalto_net

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: khalto_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-khalto_redis_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - khalto_net

  # ── API Server ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: khalto_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:    development
      DB_HOST:     postgres
      DB_PORT:     5432
      REDIS_URL:   redis://:${REDIS_PASSWORD:-khalto_redis_pass}@redis:6379
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev
    networks:
      - khalto_net

  # ── pgAdmin (dev only) ───────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: khalto_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@khalto.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - khalto_net
    profiles:
      - tools  # only starts with: docker compose --profile tools up

volumes:
  postgres_data:
  redis_data:

networks:
  khalto_net:
    driver: bridge
